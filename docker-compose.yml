services:
  web:
    build:
      context: ./homeless-shelter-availability-web
      dockerfile: Dockerfile
    container_name: homeless-shelter-availability-web
    ports:
      - "3000:80"
    environment:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8081}
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: homeless-shelter-availability-api/Dockerfile
    container_name: homeless-shelter-availability-api
    ports:
      - "8081:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-HSADB}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-ZkY6tG5lp}
      APP_CORS_ALLOWED_ORIGIN: ${APP_CORS_ALLOWED_ORIGIN:-http://localhost:3000}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  data:
    profiles:
      - import
    build:
      context: ./homeless-shelter-availability-data
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-ZkY6tG5lp}@db:5432/${DB_NAME:-HSADB}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      IMPORT_FIXTURE_MODE: ${IMPORT_FIXTURE_MODE:-true}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: homeless-shelter-availability-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ZkY6tG5lp}
      POSTGRES_DB: ${DB_NAME:-HSADB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-HSADB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
