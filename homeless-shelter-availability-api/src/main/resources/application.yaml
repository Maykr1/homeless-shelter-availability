spring:
  application:
    name: homeless-shelter-availability-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:HSADB}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:ZkY6tG5lp}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins:
      - ${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}
