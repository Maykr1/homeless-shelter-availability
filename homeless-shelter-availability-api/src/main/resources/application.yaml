spring:
  application:
    name: homeless-shelter-availability-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:homeless_shelter_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  compression:
    enabled: true
    mime-types: application/json,application/*+json,text/html,text/plain,text/css,application/javascript,text/javascript
    min-response-size: 1024
